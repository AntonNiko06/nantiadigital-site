<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nantia Digital</title>
  <meta name="description" content="Official site of nantia Digital. More content coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --white:       #ffffff;
      --off-white:   #f8f8f6;
      --black:       #111110;
      --text:        #1c1c1a;
      --text-muted:  #888880;
      --text-faint:  #c4c4bc;
      --brown:       #a0673a;
      --brown-light: #f5ede5;
      --brown-mid:   rgba(160, 103, 58, 0.15);
      --green:       #3d7a52;
      --green-light: rgba(61, 122, 82, 0.12);
      --border:      #e8e8e4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--white);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #d8d8d0 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }

    /* Fade out dot grid toward center */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(255,255,255,0.95) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ── Header ── */
    header {
      padding: 1.75rem clamp(1.5rem, 6vw, 5rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: slideDown 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
    }

    .logo {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .logo-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brown);
      margin-left: 2px;
      vertical-align: middle;
      margin-bottom: 3px;
    }

    .nav-chip {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.9rem;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(2rem, 6vw, 5rem) clamp(1.5rem, 6vw, 5rem);
      gap: 2rem;
    }

    /* ── Name ── */
    .name-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      opacity: 0;
      animation: popUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
    }

    .name-line {
      display: flex;
      align-items: baseline;
      line-height: 0.95;
    }

    .letter {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: clamp(4rem, 13vw, 10.5rem);
      letter-spacing: -0.03em;
      color: var(--text);
      display: inline-block;
      transition:
        color       0.2s ease,
        text-shadow 0.25s ease;
      cursor: default;
      user-select: none;
      will-change: transform;
    }

    .letter:hover {
      color: #5a3e2b;
      text-shadow:
        0 8px 30px rgba(160, 103, 58, 0.12),
        0 2px 8px  rgba(160, 103, 58, 0.08);
      animation: letterPulse 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes letterPulse {
      0%   { transform: scale(1)    translateY(0); }
      30%  { transform: scale(1.22) translateY(-7px); }
      55%  { transform: scale(1.17) translateY(-5px); }
      75%  { transform: scale(1.20) translateY(-6px); }
      90%  { transform: scale(1.18) translateY(-5.5px); }
      100% { transform: scale(1.19) translateY(-6px); }
    }

    /* ── Subtitle block ── */
    .subtitle-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.8s forwards;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--green-light);
      border: 1px solid rgba(61, 122, 82, 0.2);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--green);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .subtitle {
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 400;
      color: var(--text-muted);
      max-width: 340px;
      line-height: 1.6;
    }

    /* ── Rule ── */
    .rule {
      width: min(320px, 70vw);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      opacity: 0;
      animation: fadeUp 0.7s ease 1.1s forwards;
    }

    /* ── Card ── */
    .card {
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      max-width: 380px;
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.25s forwards;
      text-align: left;
    }

    .card-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--brown-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--brown);
    }

    .card-text h3 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.2rem;
    }

    .card-text p {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-text a {
      color: var(--brown);
      font-weight: 600;
      text-decoration: none;
    }

    .card-text a:hover { text-decoration: underline; }

    /* ── Footer ── */
    footer {
      padding: 1.5rem clamp(1.5rem, 6vw, 5rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.6s ease 1.6s forwards;
    }

    .footer-left {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-faint);
    }

    .footer-right a {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--brown);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .footer-right a:hover { opacity: 1; }

    /* ── Keyframes ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { max-width: 100%; }
      footer { justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="page">

    <header>
      <div class="logo">nantia<span class="logo-dot"></span></div>
      <span class="nav-chip">Coming Soon</span>
    </header>

    <main class="hero">

      <div class="name-wrap" aria-label="nantia">
        <div class="name-line" id="line1"></div>
      </div>

      <div class="subtitle-block">
        <span class="status-pill">
          <span class="status-dot"></span>
          Building something new
        </span>
        <p class="subtitle">This is the official home of nantia Digital. More content and projects will be added soon.</p>
      </div>

      <div class="rule"></div>

      <div class="card">
        <div class="card-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25H4.5a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5H4.5a2.25 2.25 0 0 0-2.25 2.25m19.5 0-9.75 6.75L2.25 6.75" />
          </svg>
        </div>
        <div class="card-text">
          <h3>Get in touch</h3>
          <p>Have a question? Reach out at <a href="mailto:contact@nantiadigital.com">contact@nantiadigital.com</a></p>
        </div>
      </div>

    </main>

    <footer>
      <span class="footer-left">&copy; 2026 nantia Digital</span>
      <span class="footer-right">
        <a href="mailto:contact@nantiadigital.com">contact@nantiadigital.com</a>
      </span>
    </footer>

  </div>

  <script>
    const words = [
      { id: 'line1', text: 'nantia' }
    ];

    words.forEach(({ id, text }) => {
      const line = document.getElementById(id);
      text.split('').forEach(char => {
        const span = document.createElement('span');
        span.className = 'letter';
        span.textContent = char;
        line.appendChild(span);
      });
    });

    document.querySelectorAll('.letter').forEach(el => {
      el.addEventListener('mouseleave', () => {
        el.style.animation = 'none';
        el.style.transform = '';
        // Re-enable animation on next hover
        requestAnimationFrame(() => { el.style.animation = ''; });
      });
    });
  </script>

</body>
</html>
